<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    height:100vh;

    display:flex;

    justify-content:center;
    align-items:center;

    background:linear-gradient(
    135deg,
    #1e0033,
    #4b0082,
    #7b2cbf
    );

    overflow:hidden;
}

/* BACKGROUND CIRCLES */

body::before{

    content:"";

    position:absolute;

    width:350px;
    height:350px;

    border:4px solid rgba(255,255,255,0.08);

    border-radius:50%;

    top:-120px;
    left:-120px;
}

body::after{

    content:"";

    position:absolute;

    width:300px;
    height:300px;

    border:4px solid rgba(255,255,255,0.08);

    border-radius:50%;

    bottom:-100px;
    right:-100px;
}

/* REGISTER BOX */

.register-box{

    width:460px;

    background:white;

    padding:40px;

    border-radius:22px;

    box-shadow:
    0 0 25px rgba(0,0,0,0.12);

    position:relative;
}

/* CLOSE */

.close{

    position:absolute;

    top:18px;
    right:22px;

    font-size:28px;

    color:#888;

    text-decoration:none;

    font-weight:bold;
}

/* TITLE */

.register-box h2{

    text-align:center;

    font-size:55px;

    color:#6d28d9;

    margin-bottom:10px;
}

/* LINE */

.line{

    width:90px;
    height:4px;

    background:#9333ea;

    margin:auto;

    border-radius:10px;

    margin-bottom:35px;
}

/* ERROR */

.error-msg{

    background:#ffe5e5;

    color:red;

    padding:12px;

    border-radius:10px;

    text-align:center;

    margin-bottom:20px;

    font-weight:bold;
}

/* INPUT BOX */

.input-box{

    margin-bottom:25px;
}

.input-box label{

    display:block;

    margin-bottom:10px;

    font-size:20px;

    font-weight:bold;

    color:#222;
}

/* FIELD */

.field{

    position:relative;
}

.field i{

    position:absolute;

    left:16px;
    top:20px;

    color:#7e22ce;

    font-size:18px;
}

/* INPUT */

.field input{

    width:100%;
    height:60px;

    border:2px solid #ddd6fe;

    border-radius:12px;

    padding-left:50px;
    padding-right:50px;

    font-size:18px;

    outline:none;
}

/* EYE */

.eye{

    position:absolute;

    right:16px;
    top:18px;

    cursor:pointer;

    font-size:22px;
}

/* BUTTON */

.create-btn{

    width:100%;
    height:60px;

    border:none;

    border-radius:12px;

    background:linear-gradient(
    135deg,
    #7e22ce,
    #9333ea
    );

    color:white;

    font-size:24px;

    font-weight:bold;

    cursor:pointer;

    margin-top:10px;
}

/* LOGIN */

.login{

    text-align:center;

    margin-top:25px;

    font-size:20px;
}

.login a{

    color:#7e22ce;

    text-decoration:none;

    font-weight:bold;
}

</style>

</head>

<body>

<div class="register-box">

    <a href="/login/"
    class="close">

        ×

    </a>

    <h2>

        Create Account

    </h2>

    <div class="line"></div>

    {% if message %}

    <div class="error-msg">

        {{ message }}

    </div>

    {% endif %}

    <!-- FORM -->

    <form action="/register/" method="POST">

        {% csrf_token %}

        <!-- USERNAME -->

        <div class="input-box">

            <label>Username</label>

            <div class="field">

                <i class="fa fa-user"></i>

                <input type="text"
                name="username"
                placeholder="Enter username"
                required>

            </div>

        </div>

        <!-- EMAIL -->

        <div class="input-box">

            <label>Email</label>

            <div class="field">

                <i class="fa fa-envelope"></i>

                <input type="email"
                name="email"
                placeholder="Enter email"
                required>

            </div>

        </div>

        <!-- PASSWORD -->

        <div class="input-box">

            <label>Create Password</label>

            <div class="field">

                <i class="fa fa-lock"></i>

                <input type="password"
                id="password"
                name="password"
                placeholder="Create password"
                required>

                <span class="eye"
                onclick="togglePassword()">

                    👁️

                </span>

            </div>

        </div>

        <!-- BUTTON -->

        <button type="submit"
        class="create-btn">

            Create Account

        </button>

    </form>

    <!-- LOGIN -->

    <div class="login">

        Already have an account?

        <a href="/login/">

            Login here

        </a>

    </div>

</div>

<script>

/* PASSWORD SHOW */

function togglePassword(){

    let input =
    document.getElementById(
    "password"
    );

    if(input.type==="password"){

        input.type="text";

    }else{

        input.type="password";
    }
}

</script>

</body>
</html>
