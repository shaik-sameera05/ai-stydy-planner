<!DOCTYPE html>
<html>
<head>

    <title>Register</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family: Arial;
            background: linear-gradient(to right, #11998e, #38ef7d);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .register-box{
            background:white;
            padding:40px;
            width:350px;
            border-radius:15px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.3);
            text-align:center;
        }

        h1{
            margin-bottom:30px;
            color:#11998e;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:25px;
            border:none;
            border-radius:8px;
            background:#11998e;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#0b7d67;
        }

        a{
            text-decoration:none;
            color:green;
        }

        p{
            margin-top:20px;
        }

    </style>

</head>

<body>

    <div class="register-box">

        <h1>Create Account</h1>

        <form method="POST">

            {% csrf_token %}
            <h3 style="color:red;">{{ message }}</h3>

            <input type="text" name="username" placeholder="Enter Username">

            <input type="email" name="email" placeholder="Enter Email">

            <input type="password" name="password" placeholder="Enter Password">

            <button type="submit">Register</button>

        </form>

        <p>
            Already have an account?
            <a href="/login/">Login</a>
        </p>

    </div>

</body>
</html>
