<!DOCTYPE html>
<html>
<head>

    <title>Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial;
        }

        body{
            background:#0f172a;
            color:white;
        }

        .navbar{
            width:100%;
            background:#111827;
            padding:20px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .navbar h2{
            color:white;
            font-size:28px;
        }

        .logout-btn{
            background:red;
            color:white;
            padding:10px 20px;
            border-radius:8px;
            text-decoration:none;
            font-weight:bold;
        }

        .main{
            display:flex;
            justify-content:center;
            align-items:center;
            margin-top:60px;
        }

        .box{
            width:500px;
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.5);
        }

        .welcome{
            text-align:center;
            margin-bottom:15px;
            font-size:22px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            font-size:50px;
        }

        input{
            width:100%;
            padding:15px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:15px;
            margin-top:20px;
            border:none;
            border-radius:10px;
            background:#06b6d4;
            color:white;
            font-size:20px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#0891b2;
        }

        .plan-box{
            margin-top:30px;
            background:#334155;
            padding:20px;
            border-radius:10px;
            line-height:35px;
            font-size:18px;
        }
        .plan-box h2{
    text-align:center;
    margin-bottom:20px;
    color:#22d3ee;
}

.plan-box pre{
    white-space:pre-wrap;
    line-height:35px;
    font-size:18px;
}

    </style>

</head>

<body>

    <div class="navbar">

        <h2>AI Study Planner</h2>

        <a href="/login/" class="logout-btn">Logout</a>

    </div>

    <div class="main">

        <div class="box">

            <div class="welcome">
                Welcome {{ request.user.username }}
            </div>

            <h1>Generate Study Plan</h1>

            <form method="POST">

                {% csrf_token %}
                <h3 style="color:red; text-align:center;">
    {{ message }}
</h3>

                <input type="text"
                name="subject"
                placeholder="Enter Subject">

                <input type="date"
                name="exam_date">

                <input type="number"
                name="study_hours"
                placeholder="Study Hours">

                <button type="submit">
                    Generate Plan
                </button>

            </form>

            {% if plan %}

            <div class="plan-box">
                <h2>Generate Study Plan</h2>
                <pre>{{plan}}</pre>
            </div>

            {% endif %}

        </div>

    </div>

</body>
</html>
