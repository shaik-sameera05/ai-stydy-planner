<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI Study Planner</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{

    background:#f3eefc;

    display:flex;

    min-height:100vh;
}

/* SIDEBAR */

.sidebar{

    width:260px;

    background:linear-gradient(
    180deg,
    #2b0057,
    #6c2bd9
    );

    color:white;

    padding:30px;

    position:fixed;

    height:100%;
}

.logo{

    text-align:center;

    margin-bottom:40px;
}

.logo i{

    font-size:60px;

    margin-bottom:15px;
}

.logo h2{

    font-size:35px;
}

.menu a{

    display:flex;

    align-items:center;

    gap:15px;

    color:white;

    text-decoration:none;

    padding:15px;

    margin-bottom:15px;

    border-radius:12px;

    font-size:20px;

    transition:0.3s;
}

.menu a:hover{

    background:rgba(255,255,255,0.15);
}

.logout{

    margin-top:40px;

    background:white;

    color:#6c2bd9 !important;

    font-weight:bold;
}

/* MAIN */

.main{

    margin-left:280px;

    width:100%;

    padding:40px;
}

.top{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:30px;
}

.top h1{

    color:#4b0082;

    font-size:42px;
}

.profile{

    width:60px;
    height:60px;

    border-radius:50%;

    background:#6c2bd9;

    display:flex;

    justify-content:center;
    align-items:center;

    color:white;

    font-size:24px;
}

/* BOX */

.box{

    background:white;

    padding:30px;

    border-radius:20px;

    margin-bottom:30px;

    box-shadow:
    0 0 20px rgba(0,0,0,0.08);
}

.box h2{

    color:#4b0082;

    margin-bottom:20px;
}

/* FORM */

.form-grid{

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:20px;
}

input{

    width:100%;

    padding:15px;

    border:none;

    background:#f3f3f3;

    border-radius:12px;

    outline:none;

    font-size:16px;
}

button{

    border:none;

    background:linear-gradient(
    135deg,
    #6c2bd9,
    #9333ea
    );

    color:white;

    height:55px;

    border-radius:12px;

    font-size:18px;

    cursor:pointer;
}

.generate-btn{

    width:100%;

    margin-top:25px;
}

/* TABLE */

table{

    width:100%;

    border-collapse:collapse;
}

table th{

    background:#f3f3f3;

    padding:15px;

    text-align:left;
}

table td{

    padding:15px;

    border-bottom:1px solid #ddd;
}

.progress-bar{

    width:100%;

    height:12px;

    background:#ddd;

    border-radius:20px;

    overflow:hidden;
}

.progress-fill{

    height:100%;

    background:#6c2bd9;
}

/* TIMETABLE */

.timetable{

    width:100%;

    overflow-x:auto;
}

.timetable table{

    min-width:900px;
}

/* RESULT */

.result{

    margin-top:25px;

    background:#f5f3ff;

    padding:25px;

    border-radius:15px;

    display:none;

    line-height:35px;
}

/* ACTION */

.action-btn{

    border:none;

    padding:8px 12px;

    border-radius:8px;

    cursor:pointer;

    color:white;

    margin-right:8px;
}

.edit{

    background:#3b82f6;
}

.delete{

    background:#ef4444;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="logo">

        <i class="fa-solid fa-graduation-cap"></i>

        <h2>AI Planner</h2>

    </div>

    <div class="menu">

        <a href="#dashboard">

            <i class="fa fa-house"></i>

            Dashboard

        </a>

        <a href="#subjects">

            <i class="fa fa-book"></i>

            Subjects

        </a>

        <a href="#progress">

            <i class="fa fa-chart-line"></i>

            Progress

        </a>

        <a href="#timetable">

            <i class="fa fa-calendar"></i>

            Timetable

        </a>

        <a href="/login/"
        class="logout">

            <i class="fa fa-right-from-bracket"></i>

            Logout

        </a>

    </div>

</div>

<!-- MAIN -->

<div class="main">

    <div class="top">

        <h1>

            Welcome Back 👋

        </h1>

        <div class="profile">

            S

        </div>

    </div>

    <!-- DASHBOARD -->

    <div class="box"
    id="dashboard">

        <h2>

            Generate Study Plan

        </h2>

        <div class="form-grid">

            <input
            type="text"
            id="subject"
            placeholder="Enter Subject">

            <input
            type="date"
            id="date">

            <input
            type="number"
            id="hours"
            placeholder="Study Hours">

            <input
            type="text"
            id="goal"
            placeholder="Enter Goal">

        </div>

        <button
        class="generate-btn"
        onclick="generatePlan()">

            Generate AI Plan

        </button>

        <div class="result"
        id="resultBox">

        </div>

    </div>

    <!-- SUBJECTS -->

    <div class="box"
    id="subjects">

        <h2>

            Subjects

        </h2>

        <table>

            <thead>

                <tr>

                    <th>Subject</th>

                    <th>Hours</th>

                    <th>Goal</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody
            id="subjectTable">

            </tbody>

        </table>

    </div>

    <!-- PROGRESS -->

    <div class="box"
    id="progress">

        <h2>

            Overall Progress

        </h2>

        <br>

        <h3 id="progressText">

            0%

        </h3>

        <br>

        <div class="progress-bar">

            <div
            class="progress-fill"
            id="progressFill"
            style="width:0%">

            </div>

        </div>

    </div>

    <!-- TIMETABLE -->

    <div class="box"
    id="timetable">

        <h2>

            Weekly Timetable

        </h2>

        <div class="timetable">

            <table>

                <thead>

                    <tr>


                        <th>Study Hours</th>

<th>Subject</th>

<th>Goal</th>
                    </tr>

                </thead>

                <tbody
                id="timetableBody">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

let totalSubjects = 0;

/* GENERATE PLAN */

function generatePlan(){

    let subject =
    document.getElementById(
    "subject"
    ).value;

    let date =
    document.getElementById(
    "date"
    ).value;

    let hours =
    document.getElementById(
    "hours"
    ).value;

    let goal =
    document.getElementById(
    "goal"
    ).value;

    if(
        subject=="" ||
        date=="" ||
        hours=="" ||
        goal==""
    ){

        alert(
        "Please fill all fields"
        );

        return;
    }

    /* RESULT */

    let result =
    document.getElementById(
    "resultBox"
    );

    result.style.display =
    "block";

    result.innerHTML = `

        <h2>
            Study Plan Generated ✅
        </h2>

        <br>

        📚 Subject :
        ${subject}

        <br><br>

        📅 Exam Date :
        ${date}

        <br><br>

        ⏰ Study Hours :
        ${hours}

        <br><br>

        🎯 Goal :
        ${goal}

        <br><br>

        📝 Daily Plan :

        <br><br>

        🌅 Morning :
        Study ${subject}

        <br><br>

        ☀ Afternoon :
        Practice Important Questions

        <br><br>

        🌙 Evening :
        Revision + Mock Tests

    `;

    /* SUBJECT TABLE */

    let table =
    document.getElementById(
    "subjectTable"
    );

    let row =
    table.insertRow();

    row.innerHTML = `

        <td>${subject}</td>

        <td>${hours} hrs</td>

        <td>${goal}</td>

        <td>

            <button
            class="action-btn edit"
            onclick="editRow(this)">

                Edit

            </button>

            <button
            class="action-btn delete"
            onclick="deleteRow(this)">

                Delete

            </button>

        </td>

    `;

    /* PROGRESS */

    totalSubjects++;

    let progress =
    totalSubjects * 20;

    if(progress>100){

        progress=100;
    }

    document.getElementById(
    "progressFill"
    ).style.width =
    progress + "%";

    document.getElementById(
    "progressText"
    ).innerHTML =
    progress + "% Completed";

    /* TIMETABLE */

    let timetable =
    document.getElementById(
    "timetableBody"
    );

    let newRow =
    timetable.insertRow();

    newRow.innerHTML = `

        <td>${hours} hrs</td>

        <td>${subject}</td>

        <td>${goal}</td>

    `;

    /* CLEAR INPUTS */

    document.getElementById(
    "subject"
    ).value = "";

    document.getElementById(
    "date"
    ).value = "";

    document.getElementById(
    "hours"
    ).value = "";

    document.getElementById(
    "goal"
    ).value = "";
}

/* DELETE */

function deleteRow(button){

    button.parentElement.parentElement.remove();

    totalSubjects--;

    if(totalSubjects<0){

        totalSubjects=0;
    }

    let progress =
    totalSubjects * 20;

    document.getElementById(
    "progressFill"
    ).style.width =
    progress + "%";

    document.getElementById(
    "progressText"
    ).innerHTML =
    progress + "% Completed";
}

/* EDIT */

function editRow(button){

    let row =
    button.parentElement.parentElement;

    let subject =
    prompt(
    "Edit Subject",
    row.cells[0].innerHTML
    );

    let hours =
    prompt(
    "Edit Hours",
    row.cells[1].innerHTML
    );

    let goal =
    prompt(
    "Edit Goal",
    row.cells[2].innerHTML
    );

    row.cells[0].innerHTML =
    subject;

    row.cells[1].innerHTML =
    hours;

    row.cells[2].innerHTML =
    goal;
}

</script>

</body>
</html>
