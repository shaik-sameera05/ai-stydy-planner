<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family: Arial;
            background: linear-gradient(to right, #141e30, #243b55);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            background:white;
            padding:40px;
            width:350px;
            border-radius:15px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.3);
            text-align:center;
        }

        h1{
            margin-bottom:30px;
            color:#243b55;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:25px;
            border:none;
            border-radius:8px;
            background:#243b55;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#141e30;
        }

        a{
            text-decoration:none;
            color:blue;
        }

        p{
            margin-top:20px;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h1>Login</h1>

        <form method="POST">

            {% csrf_token %}

            <input type="text" name="username" placeholder="Enter Username">

            <input type="password" name="password" placeholder="Enter Password">

            <button type="submit">Login</button>
            <p>
    <a href="/forgot/">Forgot Password?</a>
</p>

        </form>

        <p>
            Don't have an account?
            <a href="/register/">Register</a>
        </p>

    </div>

</body>
</html>
