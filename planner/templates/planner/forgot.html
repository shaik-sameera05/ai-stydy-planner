<!DOCTYPE html>
<html>
<head>

    <title>Forgot Password</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background: linear-gradient(to right, #8360c3, #2ebf91);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .box{
            background:white;
            padding:40px;
            width:350px;
            border-radius:15px;
            text-align:center;
            box-shadow:0px 0px 20px rgba(0,0,0,0.3);
        }

        h1{
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            border-radius:8px;
            border:1px solid #ccc;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            background:#2ebf91;
            color:white;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#249b76;
        }

        .password-box{
            position:relative;
        }

        .eye{
            position:absolute;
            right:15px;
            top:28px;
            cursor:pointer;
            font-size:18px;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>Forgot Password</h1>

    <form method="POST">

        {% csrf_token %}

        <h3 style="color:red;">{{ message }}</h3>

        <input type="text"
        name="username"
        placeholder="Enter Username">

        <div class="password-box">

            <input type="password"
            id="password"
            name="new_password"
            placeholder="New Password">

            <span class="eye"
            onclick="togglePassword()">
            👁️
            </span>

        </div>

        <div class="password-box">

            <input type="password"
            id="confirm_password"
            placeholder="Confirm Password">

            <span class="eye"
            onclick="toggleConfirmPassword()">
            👁️
            </span>

        </div>

        <button type="submit">
            Update Password
        </button>

    </form>

</div>

<script>

function togglePassword(){

    var x =
    document.getElementById("password");

    if(x.type === "password"){

        x.type = "text";

    }else{

        x.type = "password";
    }
}

function toggleConfirmPassword(){

    var x =
    document.getElementById("confirm_password");

    if(x.type === "password"){

        x.type = "text";

    }else{

        x.type = "password";
    }
}

</script>

</body>
</html>
